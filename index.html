<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body>

    <div id="top">
        <div id="extra">
            <div id="Training-toggle">
                <span>Training</span>
                <label class="switch">
                    <input type="checkbox" id="gameMode">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="help">
                <!-- Help button (Expain the game)-->

            </div>
        </div>
        <div id="stats">
            <div class="currentScore"><p>Current Score: 17</p></div>
            <div class="bestScore"><p>Best Score: 17</p></div>
        </div>
    </div>
    <br />
    <br />
    <div id="Simon-circle">
        <div class="top-semi-circle">
            <div class="circle top-left"></div>
            <div class="circle top-right"></div>
        </div>
        <div class="bottom-semi-circle">
            <div class="circle bottom-left"></div>
            <div class="circle bottom-right"></div>
        </div>
    </div>
    <div id="centre-circle" style="align-content: center;">
        <span style="display: flex; flex-direction: column; align-items: center; ">Simon</span>
    </div>

</body>

</html>
