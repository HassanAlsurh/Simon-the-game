<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body>


    <div id="top">

        <div id="extra">

            <div id="Training-toggle">
                <span>Training</span>

                <label class="switch">
                    <input type="checkbox" id="gameMode">
                    <span class="slider round"></span>
                </label>

            </div>

            <a href="help.html">
                <div id="help">
                    <!-- Help button (Expain the game)-->
                    <span>Help</span>
                    <img id="helpImg" src="assets/images/questionMark.png" alt="Need help?">
                </div>
            </a>

        </div>

        <div id="stats">

            <div class="currentScoreCard">
                <p id="currentScore">Current Score: 0</p>
            </div>

            <div class="bestScoreCard">
                <p id="bestScore">Best Score: 0</p>
            </div>

        </div>

    </div>

    <br />
    <br />

    <div id="Simon-circle">

        <div class="top-semi-circle">
            <div class="circle top-left"></div>
            <div class="circle top-right"></div>
        </div>

        <div class="bottom-semi-circle">
            <div class="circle bottom-left"></div>
            <div class="circle bottom-right"></div>
        </div>

    </div>

    <div id="centre-circle">
        <span id="Title">Simon</span>
        <button type="button" id="start">START</button>
        <span id="gameStatus"></span>
    </div>

    <div id="popup" class="popupStyle">
        <h2 id="gameStatus">Game Over</h2>
        <img src="" alt="" srcset="">
        <p id="gameStatusParagraph">Oops! looks like you pressed teh wrong button</p>
        <button type="button" id="resetGame">Restart</button>
    </div>
</body>

</html>
