<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon the game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <link rel="shortcut icon" href="assets/images/favicon.png" type="image/x-icon">
</head>

<body>

    <div id="container">

        <div id="top">

            <div id="extra">

                <div id="Training-toggle">
                    <span>Training</span>

                    <label class="switch">
                        <input type="checkbox" id="gameMode">
                        <span class="slider round"></span>
                    </label>

                </div>

                <div id="difficulty-setting">
                    <label for="difficulty">Difficulty: </label>
                    <select id="difficulty" name="difficulty">
                        <option value="easy" selected>Easy</option>
                        <option value="normal">Normal</option>
                        <option value="unlimited">Unlimited</option>
                    </select>
                </div>

                <a href="help.html">
                    <div id="help">
                        <span>Help</span>
                        <img id="helpImg" src="assets/images/questionMark.png" alt="Need help?">
                    </div>
                </a>

            </div>

            <div id="stats">

                <div class="currentScoreCard">
                    <p id="currentScore">Current Score: 0</p>
                </div>

                <div class="bestScoreCard">
                    <p id="bestScore">Best Score: 0</p>
                </div>

            </div>

        </div>

        <br />

        <div id="Simon-circle">

            <div class="top-semi-circle">
                <div class="circle top-left"></div>
                <div class="circle top-right"></div>
            </div>

            <div class="bottom-semi-circle">
                <div class="circle bottom-left"></div>
                <div class="circle bottom-right"></div>
            </div>

            <div id="centre-circle">
                <span id="Title">Simon</span>
                <button type="button" id="start">START</button>
            </div>

            <div id="popup" class="popupStyle">
                <img id="youLoseImg" src="assets/images/GameOver.png" alt="You lose, Gameover">
                <img id="youWinImg" src="assets/images/YouWon.png" alt="You won the game, Congrats">
                <p id="gameStatusParagraph"></p>
                <button type="button" id="resetGame">Restart</button>
            </div>
        </div>


    </div>

</body>

</html>
